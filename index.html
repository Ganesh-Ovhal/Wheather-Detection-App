<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheather Detection App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container border">
        <div class="first-layer">
            <input type="text" class="Enter" placeholder="Enter City Name">
            <button class="button-one">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
        <div class="Content-one">
            <h1 class="Temp">22&deg;C</h1>
            <h3 class="Cloudy">Cloudy</h3>
            <p class="London">London</p>
        </div>
        <div class="content-two">
            <div class="left-part">
                <p class="Percentage">64%</p>
                <p class="Humidity">Humidity</p>
            </div>
            <div class="right-part">
                <p class="kilo-meter">18 km/hr</p>
                <p class="Wind-Speed">Wind Speed</p>
            </div>
        </div>
    </div>
</body>
</html>
